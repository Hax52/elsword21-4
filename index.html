<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Numeral Safe Spot</title>
  <style>
    body { background: #111; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 20px; }
    #game { width: 1280px; text-align: center; position: relative; }
    #modeDisplay { font-size: 24px; font-weight: bold; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; }
    #timer { position: absolute; top: 10px; right: 20px; font-size: 22px; color: #ff6666; }
    .platform-group { display: flex; justify-content: center; margin: 10px; gap: 20px; flex-wrap: wrap; }
    .platform { width: 80px; height: 80px; border: 2px solid #555; background-color: #222; display: flex; align-items: center; justify-content: center; }
    .platform img { width: 70px; height: 70px; }
    #chatlog { background: #222; padding: 10px; margin-top: 20px; min-height: 150px; text-align: left; }
    input { padding: 6px; font-size: 16px; margin: 10px; width: 400px; }
    button { padding: 8px 20px; font-size: 16px; margin: 10px; }
    #controls, #recap { margin-top: 10px; }
    #result { margin-top: 20px; font-size: 18px; font-weight: bold; color: yellow; }
    .comp-view { filter: brightness(0.5); }
    .recap-row { margin: 6px 0; }
    .correct-tile { outline: 4px solid lime; box-shadow: 0 0 10px lime; }
    .info-tooltip {
      margin-left: 5px;
      font-size: 1.2em;
      cursor: help;
      color: #add8e6;
      display: inline-block;
      vertical-align: middle;
    }
    .action-btn {
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      border: 2px solid #555;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #standOnBtn:not(:disabled) {
      background-color: #2e7d32;
      color: white;
      border-color: #4caf50;
    }
    #standOnBtn:not(:disabled):hover {
      background-color: #4caf50;
    }
    #avoidBtn:not(:disabled) {
      background-color: #c62828;
      color: white;
      border-color: #f44336;
    }
    #avoidBtn:not(:disabled):hover {
      background-color: #f44336;
    }
    #actionButtons { margin-top: 10px; }
  </style>
</head>
<body>
  <div id="game">
    <div id="modeDisplay">Numeral Safe Spot Practice</div>
    <div id="timer">⏱️ 40</div>
    <button onclick="startGame()" id="startBtn">Start Game</button>
    <div class="platform-group" id="topRow" style="display:none;"></div>
    <div class="platform-group" id="bottomRow" style="display:none;"></div>
    <div id="chatlog"></div>
    <div id="controls" style="display:none;">
      <input id="inputBox" placeholder="Enter briefing" />
      <span id="infoIcon" class="info-tooltip" title="Tip:&#10;- You don't need to type the exact format as what shown, what matter is the result&#10;- For Final answer, type the number that appears the most, then click Stand On (Open Eye) or Avoid (Closed Eye).">❗</span>
      <div id="actionButtons">
        <button id="standOnBtn" class="action-btn" disabled onclick="submitFinal('stand')">Stand On</button>
        <button id="avoidBtn" class="action-btn" disabled onclick="submitFinal('avoid')">Avoid</button>
      </div>
    </div>
    <div id="recap" style="display:none;"></div>
    <div id="result"></div>
    <button onclick="startGame()" id="retryBtn" style="display:none;">🔁 Retry</button>
  </div>
<script>
const TOTAL_PLATFORMS = 12;
const PLATFORMS_PER_FLOOR = 6;

const SYMBOLS = ["Ⅰ","Ⅱ","Ⅲ","Ⅳ","Ⅴ","Ⅵ","Ⅶ","Ⅷ"];
const SYMBOL_TO_NUM = { "Ⅰ":"1", "Ⅱ":"2", "Ⅲ":"3", "Ⅳ":"4", "Ⅴ":"5", "Ⅵ":"6", "Ⅶ":"7", "Ⅷ":"8" };
const SYMBOL_IMG = Object.fromEntries(SYMBOLS.map((s,i)=>[s,`symbol_${i+1}.png`]));

const topRow = document.getElementById("topRow");
const bottomRow = document.getElementById("bottomRow");
const chatlog = document.getElementById("chatlog");
const inputBox = document.getElementById("inputBox");
const modeDisplay = document.getElementById("modeDisplay");
const resultBox = document.getElementById("result");
const controls = document.getElementById("controls");
const retryBtn = document.getElementById("retryBtn");
const startBtn = document.getElementById("startBtn");
const recapBox = document.getElementById("recap");
const timerDisplay = document.getElementById("timer");
const infoIcon = document.getElementById("infoIcon");
const standOnBtn = document.getElementById("standOnBtn");
const avoidBtn = document.getElementById("avoidBtn");

let mode = "", symbols = [], step = 0;
let playerTopBrief = "", playerBotBrief = "", gatheredNumbers = "", finalAnswer = "", finalAction = "";
let playerTopIdx = [], playerBotIdx = [], compTopIdx = [], compBotIdx = [];
let timer = null, timeLeft = 40;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function getRandomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function assignVisibility() {
  const topCount = getRandomInt(2, 4);
  const botCount = getRandomInt(2, 4);

  const topIndices = shuffle([...Array(PLATFORMS_PER_FLOOR).keys()]);
  playerTopIdx = topIndices.slice(0, topCount);
  compTopIdx = topIndices.slice(topCount);

  const bottomIndices = shuffle([...Array(PLATFORMS_PER_FLOOR).keys()].map(i => i + PLATFORMS_PER_FLOOR));
  playerBotIdx = bottomIndices.slice(0, botCount);
  compBotIdx = bottomIndices.slice(botCount);
}

function generateSymbols() {
  const main = SYMBOLS[Math.floor(Math.random() * 8)];
  const others = SYMBOLS.filter(s => s !== main);
  const filler = shuffle([...others, ...others]).slice(0, 6);
  const base = Array(6).fill(main).concat(filler);
  symbols = shuffle(base.slice(0, TOTAL_PLATFORMS));
}

function startTimer() {
  clearInterval(timer);
  timeLeft = 40;
  timerDisplay.textContent = `⏱️ ${timeLeft}`;
  timer = setInterval(() => {
    timeLeft--;
    timerDisplay.textContent = `⏱️ ${timeLeft}`;
    if (timeLeft <= 0) {
      clearInterval(timer);
      resultBox.innerHTML = "⏰ Time's up!";
      inputBox.disabled = true;
      standOnBtn.disabled = true;
      avoidBtn.disabled = true;
      retryBtn.style.display = "inline-block";
    }
  }, 1000);
}

function startGame() {
  clearInterval(timer);
  step = 0;
  playerTopBrief = playerBotBrief = gatheredNumbers = finalAnswer = finalAction = "";
  symbols = [];
  chatlog.innerHTML = '';
  resultBox.innerHTML = '';
  recapBox.innerHTML = '';
  inputBox.value = '';
  inputBox.disabled = false;
  recapBox.style.display = "none";
  retryBtn.style.display = "none";
  controls.style.display = "block";
  startBtn.style.display = "none";
  standOnBtn.disabled = true;
  avoidBtn.disabled = true;

  mode = Math.random() < 0.5 ? "open" : "closed";

  const modeImageSrc = mode === 'open' ? 'open.png' : 'close.png';
  modeDisplay.innerHTML = `Current Status: <img src="${modeImageSrc}" alt="${mode} eye mode" style="height: 40px; vertical-align: middle; margin-left: 10px;">`;

  generateSymbols();
  assignVisibility();

  renderRow(topRow, [...Array(PLATFORMS_PER_FLOOR).keys()]);
  renderRow(bottomRow, [...Array(PLATFORMS_PER_FLOOR).keys()].map(i => i + PLATFORMS_PER_FLOOR));

  topRow.style.display = "flex";
  bottomRow.style.display = "none";
  updatePlaceholder();
  startTimer();
}

function renderRow(row, indices) {
  row.innerHTML = '';
  const visibleSet = (row.id === "topRow") ? playerTopIdx : playerBotIdx;

  indices.forEach(idx => {
      const div = document.createElement("div");
      div.className = "platform";
      if (visibleSet.includes(idx)) {
        const sym = symbols[idx];
        if (sym && SYMBOL_IMG[sym]) {
          const img = document.createElement("img");
          img.src = SYMBOL_IMG[sym];
          div.appendChild(img);
        }
      }
      row.appendChild(div);
  });
}

function updatePlaceholder() {
  if (step <= 1) {
    inputBox.placeholder = "Enter briefing (e.g., x14 x82)";
  } else if (step === 2) {
    inputBox.placeholder = "Gather numbers";
  } else {
    inputBox.placeholder = "Type the number, then click Stand On or Avoid";
  }

  // Action buttons only enabled at the final-answer step (step 3)
  const enabled = step === 3;
  standOnBtn.disabled = !enabled;
  avoidBtn.disabled = !enabled;
}

function formatBrief(indices, visibleSet) {
  const sortedIndices = [...indices].sort((a, b) => a - b);
  const chars = sortedIndices.map(idx =>
    visibleSet.includes(idx) ? SYMBOL_TO_NUM[symbols[idx]] : 'x'
  );
  return chars.slice(0, 3).join('') + ' ' + chars.slice(3).join('');
}

function handleInput(value) {
  if (!value.trim()) return;
  if (step === 3) return; // At step 3, submission happens via the action buttons
  const topFloorIndices = [...Array(PLATFORMS_PER_FLOOR).keys()];
  const botFloorIndices = topFloorIndices.map(i => i + PLATFORMS_PER_FLOOR);

  switch(step) {
    case 0:
      playerTopBrief = value;
      chatlog.innerHTML += `<div><strong>Me (Top Floor):</strong> ${value}</div>`;
      chatlog.innerHTML += `<div><strong>Computer (Top Floor):</strong> ${formatBrief(topFloorIndices, compTopIdx)}</div>`;
      topRow.style.display = "none"; bottomRow.style.display = "flex"; break;
    case 1:
      playerBotBrief = value;
      chatlog.innerHTML += `<div><strong>Me (Bottom Floor):</strong> ${value}</div>`;
      chatlog.innerHTML += `<div><strong>Computer (Bottom Floor):</strong> ${formatBrief(botFloorIndices, compBotIdx)}</div>`;
      break;
    case 2:
      gatheredNumbers = value;
      chatlog.innerHTML += `<div><strong>Gathered Numbers:</strong> ${value}</div>`;
      break;
  }
  step++; inputBox.value = ''; updatePlaceholder();
}

function submitFinal(action) {
  if (step !== 3) return;
  const value = inputBox.value.trim();
  if (!value) {
    resultBox.innerHTML = "⚠️ Please type the number first.";
    return;
  }

  finalAnswer = value;
  finalAction = action;
  const actionLabel = action === 'stand' ? 'Stand On' : 'Avoid';
  chatlog.innerHTML += `<div><strong>Final Answer:</strong> ${value} → ${actionLabel}</div>`;

  judge();
  recapImages();
  retryBtn.style.display = "inline-block";
  clearInterval(timer);
  inputBox.disabled = true;
  standOnBtn.disabled = true;
  avoidBtn.disabled = true;
  step++;
}

function judge() {
  const counts = {};
  for (let i = 0; i < TOTAL_PLATFORMS; i++) {
    const num = SYMBOL_TO_NUM[symbols[i]];
    counts[num] = (counts[num] || 0) + 1;
  }
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  const [mainNumber, mainCount] = sorted[0];

  if (mainCount !== 6) {
    resultBox.innerHTML = `❌ Board Error! (Number appeared ${mainCount} times, not 6)`;
    return;
  }

  // The only acceptable typed number is the main (most-appeared) number
  if (finalAnswer !== mainNumber) {
    resultBox.innerHTML = `❌ Incorrect! The Number appeared the most was ${mainNumber}, not '${finalAnswer}'.`;
    return;
  }

  // Correct action depends on mode: Open Eye = Stand On, Closed Eye = Avoid
  const correctAction = mode === 'open' ? 'stand' : 'avoid';
  const chosenLabel = finalAction === 'stand' ? 'Stand On' : 'Avoid';
  const correctLabel = correctAction === 'stand' ? 'Stand On' : 'Avoid';

  if (finalAction === correctAction) {
    resultBox.innerHTML = `✅ Correct! ${correctLabel} ${mainNumber}.`;
  } else {
    resultBox.innerHTML = `❌ Incorrect! Number ${mainNumber} is correct, but not ${chosenLabel}.`;
  }
}

function recapImages() {
  recapBox.style.display = 'block';
  recapBox.innerHTML = "<h3>🔁 Answer Review: My Platforms / Computer's Platforms</h3>";

  const counts = {};
  for (let i = 0; i < TOTAL_PLATFORMS; i++) {
    const num = SYMBOL_TO_NUM[symbols[i]];
    counts[num] = (counts[num] || 0) + 1;
  }
  const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
  const [mainNumber] = sorted[0];

  const safeSpotIndices = mode === "open"
    ? symbols.map((s, i) => SYMBOL_TO_NUM[s] === mainNumber ? i : null).filter(i => i !== null)
    : symbols.map((s, i) => SYMBOL_TO_NUM[s] !== mainNumber ? i : null).filter(i => i !== null);

  const isSafe = (idx) => safeSpotIndices.includes(idx);

  const showRow = (title, indices) => {
    const row = document.createElement("div");
    row.className = "recap-row";
    row.innerHTML = `<strong>${title}:</strong> `;
    indices.forEach(idx => {
      const sym = symbols[idx];
      const img = document.createElement("img");
      img.src = SYMBOL_IMG[sym];
      img.style.width = "60px";
      img.style.margin = "4px";
      if (!playerTopIdx.includes(idx) && !playerBotIdx.includes(idx)) {
          img.classList.add("comp-view");
      }
      if (isSafe(idx)) img.classList.add("correct-tile");
      row.appendChild(img);
    });
    recapBox.appendChild(row);
  };

  const topFloorIndices = [...Array(PLATFORMS_PER_FLOOR).keys()];
  const botFloorIndices = topFloorIndices.map(i => i + PLATFORMS_PER_FLOOR);

  showRow("Top Floor", topFloorIndices);
  showRow("Bottom Floor", botFloorIndices);
}

inputBox.addEventListener("keydown", (e) => {
  if (e.key === "Enter") handleInput(inputBox.value);
});
</script>
</body>
</html>
